<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Austin Music</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<header>
<h1>🎵 Austin Music</h1>
<p>Listen • Download • Enjoy</p>
</header>


<div class="player">

<img src="cover.jpg" class="cover">


<h2 id="title">
Song Title
</h2>

<p id="artist">
Artist Name
</p>


<audio controls>
<source src="nyimbo.mp3" type="audio/mp3">
Your browser does not support audio.
</audio>


<div class="buttons">

<button>
<i class="fa-solid fa-play"></i>
Play
</button>


<a href="nyimbo.mp3" download class="download-btn">
<i class="fa-solid fa-download"></i>
Download
</a>

</div>


<h2>
🎶 Playlist
</h2>


<ul>

<li>🎵 Song 1</li>

<li>🎵 Song 2</li>

<li>🎵 Song 3</li>

</ul>


</div>


<footer>

<p>
© 2026 Austin Music
</p>

</footer>


</body>
</html>
